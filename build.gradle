plugins {
    id 'org.unbroken-dome.test-sets' version '1.2.0'
    id "org.sonarqube" version "1.1"
}

import org.gradle.internal.os.OperatingSystem;

// Apply the java plugin to add support for Java
apply plugin: 'java'
apply plugin: 'eclipse'
apply plugin: 'application'
apply plugin: 'jacoco'

mainClassName = 'com.lunar.core.LunarSystem'

sourceCompatibility = 1.8

sourceSets {
    generatedSources {
        java {
            srcDir 'target/generated-sources/java'
        }
        compileClasspath += sourceSets.main.runtimeClasspath
    }
}

testSets {
    integrationTest
    performanceTest
}

jacoco {
    toolVersion = "0.7.6.201602180812"
}

jacocoTestReport {
    reports {
        xml.enabled false
        csv.enabled false
        html.destination "$buildDir/jacocoHtml"
    }
}

test {
    jacoco {
        classDumpFile = file("$buildDir/jacoco/classes")

    }
}

compileJava {
    options.compilerArgs << '-XDignore.symbol.file'
    options.fork = true 
    source sourceSets.generatedSources.java, sourceSets.main.java
}

compileJava.doFirst {
	File compilerBinary = new File(javaHomePath.output().trim().replace('"', ''), "/bin/javac")
    options.forkOptions.executable = compilerBinary
}

// In this section you declare where to find the dependencies of your project
repositories {
    // Use 'jcenter' for resolving your dependencies.
    // You can declare any Maven/Ivy/file repository here.
    jcenter()
}

jar {
    baseName = 'lunar'
    version = '0.6'
}

// In this section you declare the dependencies for your production and test code
dependencies {
	compile files('lib/sbe-all-1.4.0-RC4.jar')
    // The production code uses the SLF4J logging API at compile time
    compile 'org.slf4j:slf4j-api:1.7.12'
    compile 'com.google.guava:guava:19.0'
    compile 'org.apache.logging.log4j:log4j-api:2.6.2'
    compile 'org.apache.logging.log4j:log4j-core:2.6.2'
    compile 'org.apache.logging.log4j:log4j-slf4j-impl:2.6.2'
    compile 'it.unimi.dsi:fastutil:7.0.12'
    compile 'com.lmax:disruptor:3.3.4'
    compile 'org.agrona:Agrona:0.5'
    compile 'io.aeron:aeron-all:0.9.7'
    compile 'com.typesafe:config:1.3.0'
    compile 'io.netty:netty-common:4.0.33.Final'
    compile 'org.hdrhistogram:HdrHistogram:2.1.4'
    compile 'org.javassist:javassist:3.20.0-GA'
    compile 'com.beust:jcommander:1.48'
    // these undertow libraries are polluting my library list!
    compile 'io.undertow:undertow-core:1.3.25.Final'
    compile 'io.undertow:undertow-websockets-jsr:1.3.25.Final'
    compile 'com.google.code.gson:gson:2.7'
    compile 'mysql:mysql-connector-java:5.1.13'
    compile group: 'net.openhft', name: 'affinity', version: '3.0.6'


    // Declare the dependency for your favourite test framework you want to use in your tests.
    // TestNG is also supported by the Gradle Test task. Just change the
    // testCompile dependency to testCompile 'org.testng:testng:6.8.1' and add
    // 'test.useTestNG()' to your build script.
    testCompile 'junit:junit:4.12'
    testCompile 'org.mockito:mockito-all:1.10.19'
    testCompile 'org.hdrhistogram:HdrHistogram:2.1.4'
    testCompile 'org.eclipse.jetty.websocket:websocket-client:9.3.0.M2'
    
    integrationTestCompile sourceSets.test.output
    
    performanceTestCompile sourceSets.test.output

    runtime files("jni/quantlib/libquantlib.so", "jni/capfutures/libctpmduapi.so", "jni/capfutures/libctpocgapi.so", "jni/coda/libnativethreadinfo.so")

}

distributions {
    main {
        contents {
	        into('bin') {
                from {
                    'src/main/resources/scripts/lunarSystem.sh'
                }
                fileMode 0755
            }
            into('bin') {
                from {
                    'src/main/resources/readme'
                }
            }
        }
    }
	performanceTest {}
}

task testJar(type: Jar) {
	classifier = 'tests'
	from sourceSets.test.output
}

tasks.withType(Test) {
    reports.html.destination = file("${reporting.baseDir}/${name}")
}

task generateSbe(type: Exec){
    inputs.file('src/main/resources/sbe/message-schema.xml')
    // TODO specify outputs such that gradle will only run this task if inputs is newer than
    // outputs
    workingDir 'src/main/resources/scripts'
	def env = System.getenv()
	if (OperatingSystem.current().isWindows()){
		if (env['UNAME'] != null && env['UNAME'].contains('CYGWIN')){
			commandLine 'bash', 'sbe_gen.sh'
		}
		else {
    		commandLine 'cmd', '/c', 'sbe_gen.bat'
		}
	}
	else {
		commandLine 'bash', 'sbe_gen.sh'
	}
}

task generateFbs(type: Exec){
    inputs.file('src/main/resources/fbs/message-schema.fbs')
    // TODO specify outputs such that gradle will only run this task if inputs is newer than
    // outputs
    workingDir 'src/main/resources/scripts'
    def env = System.getenv()
    if (OperatingSystem.current().isLinux()){
        commandLine 'bash', 'fbs_gen.sh'
    }
    else {
        commandLine 'true'
    }
}

task makeQuantLib(type: Exec) {
    workingDir 'jni/quantlib'
    def env = System.getenv()
    if (OperatingSystem.current().isLinux()){
        commandLine 'bash', 'build.sh'
    }
    else {
        commandLine 'true'
    }
}

task makeCtpOcg(type: Exec) {
    workingDir 'jni/capfutures'
    def env = System.getenv()
    if (OperatingSystem.current().isLinux()){
        commandLine 'bash', 'buildocg.sh'
    }
    else {
        commandLine 'true' 
    }
}

task makeCtpMdu(type: Exec) {
    workingDir 'jni/capfutures'
    def env = System.getenv()
    if (OperatingSystem.current().isLinux()){
        commandLine 'bash', 'buildmdu.sh'
    }
    else {
        commandLine 'true' 
    }
}

task javaHomePath(type: Exec){
	def env = System.getenv()
	workingDir '.'
	if (OperatingSystem.current().isWindows()){
		if (env['UNAME'] != null && env['UNAME'].contains('CYGWIN')){
			commandLine 'cygpath', '--mixed', env['JAVA_HOME'] 
		}
		else {
			commandLine 'cmd', '/c', 'echo', env['JAVA_HOME']
		}
	}
	else {
		commandLine 'echo', env['JAVA_HOME']
	}
	standardOutput = new ByteArrayOutputStream()
	ext.output = {
    	return standardOutput.toString()
  	}
}

task journalPrinterStartScript(type: CreateStartScripts){
    mainClassName = "com.lunar.message.binary.JournalPrinterMain"
    applicationName = "journalPrinter"
    outputDir = new File(project.buildDir, 'scripts')
    classpath = jar.outputs.files + project.configurations.runtime
}

applicationDistribution.into("bin") {
    from(journalPrinterStartScript)
    fileMode = 0755
}

compileJava.dependsOn javaHomePath, generateSbe, generateFbs, makeCtpOcg, makeCtpMdu, makeQuantLib
